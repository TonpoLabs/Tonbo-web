<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CipherTrade — Self-hosted MT5 Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #08080d; color: #e4e4f0; font-family: 'DM Sans', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #08080d; }
      ::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 3px; }
      ::selection { background: rgba(0,229,160,0.25); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <div id="error-log" style="position:fixed;bottom:0;left:0;right:0;background:#ff4466;color:white;padding:10px;z-index:99999;font-family:monospace;font-size:12px;max-height:200px;overflow:auto;">
  Loading...
</div>

<script>
  // Catch all errors and show them
  window.onerror = function(msg, url, line, col, error) {
    const errorLog = document.getElementById('error-log');
    errorLog.innerHTML += `<div>ERROR: ${msg} at ${url}:${line}</div>`;
    errorLog.innerHTML += `<div>${error?.stack?.split('\\n')[0] || ''}</div>`;
    return true;
  };
  
  // Catch unhandled promise rejections
  window.onunhandledrejection = function(e) {
    const errorLog = document.getElementById('error-log');
    errorLog.innerHTML += `<div>PROMISE ERROR: ${e.reason?.message || e.reason}</div>`;
  };
  
  // Log when React should load
  setTimeout(() => {
    const root = document.getElementById('root');
    if (root && root.innerHTML === '') {
      document.getElementById('error-log').innerHTML += '<div>Root is still empty after 3 seconds</div>';
    }
  }, 3000);
</script>
  </body>
</html>
